build-test-windows:
    timeout-minutes: 90
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.11"
          activate-environment: compress_env
          auto-activate-base: false

      - name: Install Python deps via conda/pip
        shell: pwsh
        run: |
          conda activate compress_env
          conda install -y numpy scipy
          pip install --upgrade pip wheel setuptools

          # Install PyTorch CPU (no CUDA needed for CI)
          pip install torch==2.8.0 torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

          # Filter out Linux/GPU-only lines from requirements.txt
          $lines = Get-Content requirements.txt | Where-Object {
            $_ -notmatch "^torch" -and
            $_ -notmatch "^torchvision" -and
            $_ -notmatch "^--extra-index-url" -and
            $_ -notmatch "^cupy" -and
            $_ -notmatch "^nvidia" -and
            $_ -notmatch "^\s*$"
          }
          $lines | Set-Content temp_requirements.txt
          pip install --no-cache-dir -r temp_requirements.txt
          Remove-Item temp_requirements.txt

      - name: Install compressai from source
        shell: pwsh
        run: |
          conda activate compress_env
          git clone https://github.com/InterDigitalInc/CompressAI.git
          cd CompressAI
          pip install -e .

      - name: Install imageio
        shell: pwsh
        run: |
          conda activate compress_env
          pip install imageio==2.37.0

      - name: Install cmake and zstd via conda
        shell: pwsh
        run: |
          conda activate compress_env
          conda install -y -c conda-forge cmake zstd

      - name: Download pretrained models
        shell: bash
        run: |
          source /c/Miniconda/etc/profile.d/conda.sh || true
          conda activate compress_env || true
          chmod +x download_models.sh
          ./download_models.sh

      - name: Prepare CAESAR models
        shell: pwsh
        run: |
          conda activate compress_env
          python CAESAR_compressor.py cpu
          python CAESAR_hyper_decompressor.py cpu
          python CAESAR_decompressor.py cpu

      - name: Configure CMake
        shell: pwsh
        run: |
          conda activate compress_env
          $TORCH_PATH = python -c "import torch; print(torch.utils.cmake_prefix_path)"
          echo "Torch CMake path: $TORCH_PATH"

          New-Item -ItemType Directory -Force -Path build
          cd build

          cmake .. `
            -DCMAKE_PREFIX_PATH="$TORCH_PATH" `
            -DBUILD_TESTS=ON `
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build project
        shell: pwsh
        run: |
          cd build
          cmake --build . --config Debug --parallel

      - name: Generate dummy test data
        shell: pwsh
        run: |
          conda activate compress_env
          python tests/gen_data.py build/tests --filename TCf48.bin.f32

      - name: Run test_caesarCD
        shell: pwsh
        run: |
          cd build/tests
          New-Item -ItemType Directory -Force -Path output
          .\test_caesarCD.exe

      - name: Run test_runGaeCuda
        shell: pwsh
        run: |
          cd build/tests
          .\test_runGaeCuda.exe

      - name: Run test_padding
        shell: pwsh
        run: |
          cd build/tests
          .\test_padding.exe

      - name: Check test results
        shell: pwsh
        run: |
          echo "Test completed successfully on windows-latest!"